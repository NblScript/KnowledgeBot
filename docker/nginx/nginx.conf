worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml;

    # 上传文件大小限制
    client_max_body_size 50M;

    # 限流配置
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # 上游服务定义
    upstream auth_service {
        server auth:8001;
        keepalive 32;
    }

    upstream knowledge_service {
        server knowledge:8002;
        keepalive 32;
    }

    upstream embedding_service {
        server embedding:8003;
        keepalive 32;
    }

    upstream chat_service {
        server chat:8004;
        keepalive 32;
    }

    upstream ingest_service {
        server ingest:8005;
        keepalive 32;
    }

    # 主服务
    server {
        listen 80;
        server_name localhost;

        # 健康检查
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # API 文档（合并所有服务的文档）
        location /docs {
            return 301 /docs/auth/;
        }

        # Auth Service (端口 8001)
        location /v1/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://auth_service/v1/auth/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # 超时配置
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        location /v1/users/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth_service/v1/users/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /v1/tenants/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth_service/v1/tenants/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /v1/roles/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth_service/v1/roles/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Knowledge Service (端口 8002)
        location /v1/knowledge-bases/ {
            limit_req zone=api_limit burst=30 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://knowledge_service/v1/knowledge-bases/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # 上传大文件超时
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        location /v1/documents/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://knowledge_service/v1/documents/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Embedding Service (端口 8003)
        location /v1/embeddings/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://embedding_service/v1/embeddings/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # 向量化可能较慢
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # Chat Service (端口 8004)
        location /v1/chat/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://chat_service/v1/chat/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # LLM 可能响应较慢
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 300s;
        }

        location /v1/conversations/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://chat_service/v1/conversations/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # SSE 流式响应
        location /v1/stream/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://chat_service/v1/stream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # SSE 配置
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            chunked_transfer_encoding off;
            
            # 长连接超时
            proxy_read_timeout 86400s;
            send_timeout 86400s;
        }

        # Ingest Service (端口 8005)
        location /v1/tasks/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://ingest_service/v1/tasks/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /v1/queue/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://ingest_service/v1/queue/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # 各服务的 API 文档
        location /docs/auth/ {
            proxy_pass http://auth_service/docs/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        location /docs/knowledge/ {
            proxy_pass http://knowledge_service/docs/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        location /docs/embedding/ {
            proxy_pass http://embedding_service/docs/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        location /docs/chat/ {
            proxy_pass http://chat_service/docs/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        location /docs/ingest/ {
            proxy_pass http://ingest_service/docs/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        # OpenAPI JSON
        location /openapi/auth.json {
            proxy_pass http://auth_service/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /openapi/knowledge.json {
            proxy_pass http://knowledge_service/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /openapi/embedding.json {
            proxy_pass http://embedding_service/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /openapi/chat.json {
            proxy_pass http://chat_service/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /openapi/ingest.json {
            proxy_pass http://ingest_service/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # 错误页面
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}