# KnowledgeBot 微服务部署配置
# ==================== Auth Service ====================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: knowledgebot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: knowledgebot-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: knowledgebot-config
            - secretRef:
                name: knowledgebot-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: DATABASE_SCHEMA
              value: "auth"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: knowledgebot
spec:
  selector:
    app: auth
  ports:
    - port: 8001
      targetPort: 8001

---
# ==================== Knowledge Service ====================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge
  namespace: knowledgebot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: knowledge
  template:
    metadata:
      labels:
